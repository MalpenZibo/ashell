[package]
name = "ashell"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
gtk4-layer-shell = "0.0.3"
gtk = { package = "gtk4", version = "0.6" }
gdk = { package = "gdk4", version = "0.6" }
futures-signals = "0.3.32"
futures = "0.3.28"
glib = "0.17.10"
grass = { version = "0.12.4", features = ["macro"] }
serde = "1.0.166"
serde_json = "1.0.99"
hyprland = { version = "0.3.3" }
tokio = "1.29.1"
sysinfo = "0.29.4"
chrono = "0.4.26"
relm4 = "0.6.0"
relm4-components = "0.6.0"
udev = "0.7.0"

[build-dependencies]
fs_extra = "1.2"
