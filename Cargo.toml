[package]
name = "ashell"
version = "0.1.0"
edition = "2021"

[dependencies]
gtk4-layer-shell = "0.2.0"
gtk4 = "0.7.3"
gdk4 = "0.7.3"
glib = "0.18.1"
grass = { version = "0.12.4", features = ["macro"] }
serde = "1.0.166"
serde_json = "1.0.107"
hyprland = "0.3.12"
sysinfo = "0.29.4"
chrono = "0.4.26"
udev = "0.7.0"
leptos = "0.5.0-beta"
typed-builder = "0.16.2"
futures-signals = "0.3.3"
futures = "0.3.28"
tokio = { version = "1", features = ["full"] }


[build-dependencies]
fs_extra = "1.2"
